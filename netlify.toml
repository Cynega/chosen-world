[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Security headers (all routes) ────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Disable browser features we don't use
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
    # Force HTTPS for 2 years
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Prevent cross-origin window access
    Cross-Origin-Opener-Policy = "same-origin"
    # Content Security Policy
    # - script-src 'self': only our own bundled JS
    # - style-src 'unsafe-inline': required — the app uses React inline styles throughout
    # - font-src: Google Fonts files
    # - img-src data:: required for SVG data URIs in CSS (film-grain effect)
    # - connect-src cdn.jsdelivr.net: world atlas JSON for the map
    Content-Security-Policy = "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://cdn.jsdelivr.net; frame-ancestors 'none'; base-uri 'self'; form-action 'none'; upgrade-insecure-requests"

# ─── Cache: static assets are content-hashed by Vite → immutable ──────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── No-cache for the HTML entry point ────────────────────────────────────────
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
